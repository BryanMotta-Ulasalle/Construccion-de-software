<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Notes Client</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 40px auto; padding: 20px; }
    .note { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 4px; }
    input, textarea { display: block; width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; }
    button { padding: 8px 16px; background: #1e88e5; color: white; border: 0; cursor: pointer; }
    nav { margin-bottom: 20px; }
    nav a { margin-right: 16px; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
